<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Creare cont</title>

<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <h3 class="mb-4 text-center">Creează cont nou</h3>

    <form method="POST">
        <div class="mb-3">
            <label>Nume</label>
            <input type="text" name="nume" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Prenume</label>
            <input type="text" name="prenume" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" name="telefon" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Parolă</label>
            <input type="password" name="parola" class="form-control" required>
        </div>

        <button class="btn btn-success w-100">
            Creează cont
        </button>
    </form>

    <p class="mt-3 text-center">
        Ai deja cont?
        <a href="{{ url_for('login') }}">Autentifică-te</a>
    </p>
</div>

</body>
</html>
