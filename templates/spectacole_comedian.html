<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Spectacole comedian</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">
    <a href="/spectacole" class="btn btn-secondary mb-3">Înapoi</a>

    <h3>Spectacolele acestui comedian</h3>

    {% if spectacole %}
    <ul class="list-group mt-3">
        {% for s in spectacole %}
        <li class="list-group-item">
            <a href="{{ url_for('spectacol_detalii', spectacol_id=s.SpectacolID) }}">
                {{ s.Titlu }} – {{ s.DataSpectacol }} {{ s.OraSpectacol.strftime('%H:%M') }}
            </a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
        <p class="text-muted">Acest comedian nu are spectacole.</p>
    {% endif %}
</div>
</body>
</html>
