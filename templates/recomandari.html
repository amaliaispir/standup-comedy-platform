<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Recomandări</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/spectacole">Stand-Up</a>
  </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-3">Spectacole recomandate</h3>
    <a href="/spectacole" class="btn btn-secondary mb-4">Înapoi</a>

    <div class="row">
        {% for r in recomandari %}
        <div class="col-md-4 mb-4">
            <div class="card card-spectacol p-3 h-100">

                    <h5>
                        <a href="{{ url_for('spectacol_detalii', spectacol_id=r.SpectacolID) }}"
                            class="text-decoration-none text-dark">
                            {{ r.Titlu }}
                        </a>
                    </h5>

                <div class="spectacol-meta">
                    📍 {{ r.NumeLocatie }}<br>
                    📅 {{ r.DataSpectacol }}
                </div>

                <a href="{{ url_for('rezerva', spectacol_id=r.SpectacolID) }}"
                   class="btn btn-outline-primary mt-3 w-100">
                    Rezervă bilet
                </a>

            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
