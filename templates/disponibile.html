<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Spectacole disponibile</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/spectacole">Stand-Up</a>
  </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-3">Spectacole cu locuri disponibile</h3>
    <a href="/spectacole" class="btn btn-secondary mb-4">Înapoi</a>

    <div class="row">
        {% for s in spectacole %}
        <div class="col-md-4 mb-4">
            <div class="card card-spectacol p-3">

                    <h5>
                        <a href="{{ url_for('spectacol_detalii', spectacol_id=s.SpectacolID) }}"
                            class="text-decoration-none text-dark">
                            {{ s.Titlu }}
                        </a>
                    </h5>

                <div class="spectacol-meta mb-2">
                    📍 {{ s.NumeLocatie }}<br>
                    🪑 Locuri libere: <strong>{{ s.LocuriLibere }}</strong>
                </div>

                <!-- AICI SE PUNE REZERVA -->
                <a href="{{ url_for('rezerva', spectacol_id=s.SpectacolID) }}"
                   class="btn btn-outline-primary w-100">
                    Rezervă bilet
                </a>

            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
