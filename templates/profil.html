<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Profilul meu</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2>Profilul meu</h2>

    <form method="POST" class="card p-4 mt-3">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Nume</label>
                <input name="nume" class="form-control" value="{{ client.NumeClient }}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label>Prenume</label>
                <input name="prenume" class="form-control" value="{{ client.PrenumeClient }}" required>
            </div>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input name="email" type="email" class="form-control" value="{{ client.Email }}" required>
        </div>

        <div class="mb-3">
            <label>Verifica parola</label>
            <input name="parola" type="password" class="form-control" required>
        </div>

        <button class="btn btn-primary">Salvează modificările</button>
        <a href="/biletele_mele" class="btn btn-secondary">Înapoi</a>
    </form>

    <form method="POST" action="/sterge_cont" class="mt-4">
        <button class="btn btn-danger"
                onclick="return confirm('Sigur vrei să ștergi contul?')">
            Șterge contul definitiv
        </button>
    </form>
</div>

</body>
</html>
