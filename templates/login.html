<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Login Stand-Up</title>
<!-- include bootstrap 5 din cdn ca sa arate frumos pagina -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<!-- container bootstrap pentru centrul paginii -->
<div class="container mt-5">
    <h2>Login Stand-Up</h2>
    
    <!-- formular login trimite date prin POST -->
    <form method="POST">
        <!-- aici afiseaza mesajele flash trimise de flask -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <!-- alert bootstrap: category poate fi success/danger/info -->
                    <div class="alert alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- camp email -->
        <div class="mb-3">
            <label>email:</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <!-- camp parola -->
        <div class="mb-3">
            <label>parola:</label>
            <input type="password" name="parola" class="form-control" required>
        </div>

        <!-- buton login -->
        <button class="btn btn-primary">login</button>
    </form>
    <hr>

<p class="text-center">
    <a href="{{ url_for('register') }}">Creează cont nou</a>
</p>

</div>
</body>
</html>
